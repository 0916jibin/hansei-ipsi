// ── 매뉴얼 다운로드 (Word/HTML) ────────────────────────────────
function downloadManualAsWord(manual) {
  let html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>
  body { font-family: '맑은 고딕', sans-serif; margin: 40px; color: #1a1d2e; }
  h1 { color: #1a4fa8; border-bottom: 2px solid #1a4fa8; padding-bottom: 8px; font-size: 22px; margin-top: 40px; }
  h2 { color: #2a2e45; font-size: 17px; margin-top: 24px; border-left: 4px solid #3b6fd4; padding-left: 10px; }
  p { line-height: 1.9; font-size: 14px; margin: 6px 0; }
  .tag { background: #dde8f8; color: #2b5fc4; border-radius: 20px; padding: 2px 8px; font-size: 12px; margin-right: 4px; }
  .updated { color: #b0b4cc; font-size: 12px; margin-bottom: 16px; }
  .important { color: #c47000; font-weight: bold; }
  .page-break { page-break-before: always; }
  table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  td, th { border: 1px solid #d0d4e8; padding: 8px 12px; font-size: 13px; }
  th { background: #1a4fa8; color: white; }
  tr:nth-child(even) { background: #f5f6fa; }
</style>
</head><body>`;

  html += `<h1 style="text-align:center; font-size:28px; border:none; color:#1a4fa8; margin-bottom:4px;">입학팀 업무매뉴얼</h1>`;
  html += `<p style="text-align:center; color:#8a8ea8; margin-bottom:40px;">한세대학교 입학처 · 최종수정: ${new Date().toLocaleDateString('ko-KR')}</p>`;

  manual.categories.forEach((cat, ci) => {
    if (ci > 0) html += `<div class="page-break"></div>`;
    html += `<h1>${cat.icon} ${cat.title}</h1>`;
    cat.articles.forEach(art => {
      html += `<h2>${art.title}</h2>`;
      html += `<div class="updated">최종수정: ${new Date(art.updatedAt).toLocaleDateString('ko-KR')}</div>`;
      if (art.tags && art.tags.length > 0) {
        html += `<p>${art.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</p>`;
      }
      art.content.split('\n').forEach(line => {
        if (line.startsWith('[IMG:') && line.endsWith(']')) {
          html += `<p><img src="${line.slice(5,-1)}" style="max-width:100%;border-radius:6px;"/></p>`;
        } else {
          const escaped = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          const starred = escaped.replace(/★([^★\n]*)/g, '<span class="important">★$1</span>');
          html += `<p>${starred || '&nbsp;'}</p>`;
        }
      });
    });
  });

  html += `</body></html>`;

  const blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `입학팀_업무매뉴얼_${new Date().toISOString().slice(0,10)}.doc`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── 로그 엑셀 다운로드 ────────────────────────────────────────
function downloadLogsAsExcel(logs) {
  const BOM = '\uFEFF';
  const headers = ['번호', '계정', '작업', '대상유형', '항목명', '일시'];
  const rows = logs.map((log, i) => [
    i + 1,
    log.user_id,
    log.action,
    log.target_type || '',
    log.target_title || '',
    new Date(log.created_at).toLocaleString('ko-KR')
  ]);
  const csv = BOM + [headers, ...rows]
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `편집로그_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── 이미지 업로드 ──────────────────────────────────────────────
async function uploadImage(file) {
  const ext = file.name.split('.').pop();
  const fileName = 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2,6) + '.' + ext;
  const res = await fetch(SUPA_URL + '/storage/v1/object/manual-images/' + fileName, {
    method: 'POST',
    headers: {
      apikey: SUPA_KEY,
      Authorization: 'Bearer ' + SUPA_KEY,
      'Content-Type': file.type,
      'x-upsert': 'true'
    },
    body: file
  });
  if (!res.ok) throw new Error('이미지 업로드 실패: ' + await res.text());
  return SUPA_URL + '/storage/v1/object/public/manual-images/' + fileName;
}

async function sb(path, opts={}) {
  const r = await fetch(SUPA_URL+"/rest/v1"+path, {
    ...opts,
    headers: {
      apikey: SUPA_KEY,
      Authorization: "Bearer "+SUPA_KEY,
      "Content-Type": "application/json",
      Prefer: opts.prefer||"return=representation",
      ...(opts.headers||{})
    }
  });
  if (!r.ok) throw new Error(await r.text());
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

async function dbLoad() {
  const [cats, arts] = await Promise.all([
    sb("/categories?order=sort_order"),
    sb("/articles?order=sort_order")
  ]);
  return {
    lastUpdated: new Date().toISOString(),
    categories: (cats||[]).map(c => ({
      id:c.id, title:c.title, icon:c.icon||"📁",
      articles: (arts||[]).filter(a=>a.category_id===c.id).map(a=>({
        id:a.id, title:a.title, content:a.content||"",
        tags:a.tags||[], updatedAt:a.updated_at
      }))
    }))
  };
}

async function dbSeed(manual) {
  for(let ci=0;ci<manual.categories.length;ci++){
    const cat=manual.categories[ci];
    try{ await sb("/categories",{method:"POST",prefer:"return=minimal",body:JSON.stringify({id:cat.id,title:cat.title,icon:cat.icon,sort_order:ci})});}catch(e){}
    for(let ai=0;ai<cat.articles.length;ai++){
      const art=cat.articles[ai];
      try{ await sb("/articles",{method:"POST",prefer:"return=minimal",body:JSON.stringify({id:art.id,category_id:cat.id,title:art.title,content:art.content,tags:art.tags,sort_order:ai,updated_at:new Date().toISOString()})});}catch(e){}
    }
  }
}

    if(line.includes("★")){

      return html`<p key=${i} style=${style} dangerouslySetInnerHTML=${{__html:inner}}></p>`;

    return html`<p key=${i} style=${style}>${line||html`<br/>`}</p>`;

            </div>
            ${prog&&prog.done===prog.total&&prog.total>0?html`
              <div style=${{marginTop:28,padding:"20px",background:"#f0faf2",border:"1px solid #b8dfc2",borderRadius:12,textAlign:"center"}}>
                <div style=${{fontSize:24,marginBottom:8}}>🎉</div>
                <div style=${{fontSize:15,color:"#2a8a3a",fontWeight:600}}>모든 항목 완료!</div>
                <div style=${{fontSize:12,color:"#5a8f6a",marginTop:4}}>수고하셨습니다</div>
              </div>`:null}
          </div>`:null}

        ${(mode==="view"||mode==="checklist")&&!art?html`
          <div style=${{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#b0b4cc"}}>
            <div style=${{fontSize:48,marginBottom:16}}>📂</div>
            <div style=${{fontSize:15}}>항목을 선택하거나 새로 추가하세요</div>
          </div>`:null}

        ${mode==="edit"||mode==="new-article"?html`
          <div style=${{maxWidth:760}}>
            <div style=${{fontSize:16,fontWeight:700,color:"#2b5fc4",marginBottom:8}}>${mode==="edit"?"항목 편집":"새 항목 추가"}</div>
            <div style=${{fontSize:12,color:"#8a8ea8",marginBottom:24,padding:"10px 14px",background:"#f0f2f8",border:"1px solid #e8eaf0",borderRadius:8,lineHeight:"1.8"}}>
              💡 <code style=${{background:"#eef1f9",padding:"1px 6px",borderRadius:3,fontSize:11,color:"#2b5fc4"}}>1.</code> 또는 <code style=${{background:"#eef1f9",padding:"1px 6px",borderRadius:3,fontSize:11,color:"#2b5fc4"}}>-</code> 로 시작하는 줄은 체크리스트 항목이 됩니다
            </div>
            <div style=${{marginBottom:18}}>
              <div class="field-label">제목</div>
              <input class="text-input" value=${editD.title||""} onInput=${e=>setEditD(d=>({...d,title:e.target.value}))} placeholder="항목 제목을 입력하세요"/>
            </div>
            <div style=${{marginBottom:18}}>
              <div class="field-label">내용</div>
              <textarea class="text-input" value=${editD.content||""} onInput=${e=>setEditD(d=>({...d,content:e.target.value}))} placeholder="업무 내용을 입력하세요..." style=${{minHeight:360,paddingTop:12}}></textarea>
              <div style=${{marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                <label style=${{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",background:"#f0f2f8",border:"1px solid #d0d4e8",borderRadius:6,cursor:"pointer",fontSize:12,color:"#555870",fontWeight:500}}>
                  ${imgUploading ? "⏳ 업로드 중..." : "🖼️ 이미지 삽입"}
                  <input type="file" accept="image/*" style=${{display:"none"}} disabled=${imgUploading}
                    onChange=${e=>handleImageInsert(e, editD.content, v=>setEditD(d=>({...d,content:typeof v==="function"?v(d.content):v})))}/>
                </label>
                <span style=${{fontSize:11,color:"#b0b4cc"}}>JPG, PNG, GIF · 5MB 이하</span>
              </div>
            </div>
            <div style=${{marginBottom:24}}>
              <div class="field-label">태그 (쉼표로 구분)</div>
              <input class="text-input" value=${editD.tags||""} onInput=${e=>setEditD(d=>({...d,tags:e.target.value}))} placeholder="예: 수시, 원서접수"/>
            </div>
            <div style=${{display:"flex",gap:8}}>
              <button class="btn btn-primary" onClick=${mode==="edit"?saveEdit:addArt}>저장</button>
              <button class="btn btn-ghost" onClick=${()=>setMode("view")}>취소</button>
            </div>
          </div>`:null}

        ${mode==="new-cat"?html`
          <div style=${{maxWidth:480}}>
            <div style=${{fontSize:16,fontWeight:700,color:"#2b5fc4",marginBottom:24}}>새 카테고리 추가</div>
            <div style=${{marginBottom:18}}>
              <div class="field-label">아이콘 (이모지)</div>
              <input class="text-input" value=${editD.catIcon||""} onInput=${e=>setEditD(d=>({...d,catIcon:e.target.value}))} placeholder="📁" style=${{width:80}}/>
            </div>
            <div style=${{marginBottom:24}}>
              <div class="field-label">카테고리명</div>
              <input class="text-input" value=${editD.catTitle||""} onInput=${e=>setEditD(d=>({...d,catTitle:e.target.value}))} placeholder="예: 장학 업무"/>
            </div>
            <div style=${{display:"flex",gap:8}}>
              <button class="btn btn-primary" onClick=${addCat}>만들기</button>
              <button class="btn btn-ghost" onClick=${()=>setMode("view")}>취소</button>
            </div>
          </div>`:null}

      </div>`:null}

    </div>



    ${confirmModal?html`
      <div class="modal-overlay">
        <div class="modal-box">
          <div style=${{fontSize:16,fontWeight:700,marginBottom:4}}>⚠️ 삭제 확인</div>
          <div style=${{fontSize:12,color:"#8a8ea8",marginBottom:20}}>삭제하려면 비밀번호를 한 번 더 입력하세요</div>
          <input class="text-input" type="password" placeholder="비밀번호" value=${confirmPw}
            onInput=${e=>{setConfirmPw(e.target.value);setConfirmErr(false);}}
            onKeyDown=${e=>e.key==="Enter"&&submitConfirm()}
            style=${{marginBottom:confirmErr?6:16}} autoFocus/>
          ${confirmErr?html`<div style=${{fontSize:12,color:"#cc4444",marginBottom:12}}>비밀번호가 틀렸습니다</div>`:null}
          <div style=${{display:"flex",gap:8}}>
            <button class="btn btn-danger" style=${{flex:1}} onClick=${submitConfirm}>삭제 확인</button>
            <button class="btn btn-ghost" style=${{flex:1}} onClick=${()=>{setConfirmModal(false);setPendingDel(null);}}>취소</button>
          </div>
        </div>
      </div>`:null}

    ${showLogs?html`
      <div class="modal-overlay" onClick=${()=>setShowLogs(false)}>
        <div style=${{background:"#fff",borderRadius:12,padding:"24px 28px",width:"min(600px,90vw)",maxHeight:"70vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}} onClick=${e=>e.stopPropagation()}>
          <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div style=${{fontSize:16,fontWeight:700}}>📋 편집 로그</div>
            <div style=${{display:"flex",gap:8,alignItems:"center"}}>
              <button style=${{fontSize:11,background:"none",border:"1px solid #d0d4e8",borderRadius:12,padding:"2px 10px",cursor:"pointer",color:"#2a8a3a"}} onClick=${()=>downloadLogsAsExcel(logs)}>⬇️ 엑셀 다운로드</button>
              <button style=${{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#8a8ea8"}} onClick=${()=>setShowLogs(false)}>×</button>
            </div>
          </div>
          <div style=${{flex:1,overflowY:"auto"}}>
            ${logs.length===0?html`<div style=${{color:"#b0b4cc",textAlign:"center",padding:"24px"}}>로그가 없습니다</div>`:null}
            ${logs.map(log=>html`
              <div key=${log.id} style=${{padding:"10px 0",borderBottom:"1px solid #f0f2f8",display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style=${{flex:1}}>
                  <div style=${{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                    <span style=${{fontSize:12,fontWeight:600,color:"#1a1d2e"}}>${log.user_id}</span>
                    <span style=${{fontSize:11,padding:"1px 7px",borderRadius:10,background:log.action==="삭제"||log.action==="카테고리삭제"?"#fff0f0":log.action==="추가"||log.action==="카테고리추가"?"#f0faf2":"#f0f4ff",color:log.action==="삭제"||log.action==="카테고리삭제"?"#cc4444":log.action==="추가"||log.action==="카테고리추가"?"#2a8a3a":"#2b5fc4"}}>${log.action}</span>
                  </div>
                  <div style=${{fontSize:12,color:"#555870"}}>${log.target_title}</div>
                </div>
                <div style=${{fontSize:11,color:"#b0b4cc",flexShrink:0}}>${fmtLog(log.created_at)}</div>
              </div>`)}
          </div>
        </div>
      </div>`:null}

    ${toast?html`<div class="save-toast">✓ 저장되었습니다</div>`:null}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
}














</script>
</body>
</html>
